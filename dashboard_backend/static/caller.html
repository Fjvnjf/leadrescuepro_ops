<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LRP Caller Dashboard</title>
<style>
:root{--bg:#02040a;--panel:#07101b;--line:#173653;--text:#e8f7ff;--muted:#7d9bb7;--cyan:#31d7ff;--green:#2dff9a;--amber:#ffd166;--red:#ff416d;--purple:#9f7aea;--panel2:#0b1625;--shadow:0 0 42px rgba(49,215,255,.12),inset 0 0 38px rgba(28,105,212,.04)}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -12%,rgba(28,105,212,.42),transparent 34rem),radial-gradient(circle at 88% 18%,rgba(49,215,255,.16),transparent 24rem),linear-gradient(180deg,#02040a,#050a12 58%,#02040a);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(49,215,255,.035)1px,transparent 1px),linear-gradient(90deg,rgba(49,215,255,.03)1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at center,black,transparent 78%)}
button,input,select,textarea{font:inherit}
.wrap{position:relative;max-width:1240px;margin:0 auto;padding:18px}
.login-shell{min-height:100vh;display:grid;place-items:center;padding:18px}
.login-card{width:min(100%,390px);border:1px solid var(--line);background:linear-gradient(180deg,rgba(11,22,37,.9),rgba(4,8,15,.94));box-shadow:var(--shadow);padding:24px}
.brand{display:flex;align-items:center;gap:10px;color:var(--cyan);font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px}
.brand-dot{width:10px;height:10px;border:1px solid var(--cyan);box-shadow:0 0 16px rgba(49,215,255,.75);background:rgba(49,215,255,.22)}
h1{font-size:25px;line-height:1;margin:0 0 8px;font-weight:700;letter-spacing:-.03em}
h2{margin:0 0 10px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#bfefff}
.muted{color:var(--muted)}
.fine{font-size:11px;color:var(--muted)}
.field{display:flex;flex-direction:column;gap:4px}.field label{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:900}
input,select,textarea{width:100%;min-height:44px;border:1px solid var(--line);border-radius:0;background:#06101b;color:var(--text);padding:10px 11px;outline:none}
textarea{min-height:80px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:rgba(49,215,255,.78);box-shadow:0 0 0 2px rgba(49,215,255,.08)}
.btn{min-height:44px;border:1px solid rgba(49,215,255,.42);border-radius:0;background:rgba(49,215,255,.08);color:var(--cyan);padding:10px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.12em;font-size:10px;font-weight:900;font-family:inherit}
.btn:hover,.btn:focus-visible{background:rgba(49,215,255,.16);border-color:var(--cyan)}.btn:disabled{opacity:.55;cursor:wait}
.btn-red{color:var(--red);border-color:rgba(255,65,109,.45);background:rgba(255,65,109,.06)}.btn-red:hover,.btn-red:focus-visible{background:rgba(255,65,109,.13);border-color:var(--red)}
.btn-full{width:100%;margin-top:10px}.btn-gr{color:var(--green);border-color:rgba(45,255,154,.45);background:rgba(45,255,154,.06)}.btn-gr:hover{background:rgba(45,255,154,.13);border-color:var(--green)}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.hdr-main{display:flex;flex-direction:column;gap:4px}
.caller-name{font-size:22px;line-height:1;font-weight:700;letter-spacing:-.03em}
.hdr-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{display:inline-flex;align-items:center;min-height:28px;border:1px solid rgba(49,215,255,.32);background:rgba(49,215,255,.07);padding:4px 8px;color:var(--cyan);font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:900}.chip.ok{color:var(--green);border-color:rgba(45,255,154,.45);background:rgba(45,255,154,.06)}.chip.stop{color:var(--red);border-color:rgba(255,65,109,.45);background:rgba(255,65,109,.06)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(11,22,37,.88),rgba(4,8,15,.9));box-shadow:var(--shadow);padding:14px}
.quick{grid-column:span 7}.stats{grid-column:span 5}.wide{grid-column:span 12}.half{grid-column:span 6}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.span2{grid-column:span 2}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.kpi{border:1px solid rgba(23,54,83,.78);background:rgba(6,16,27,.64);padding:10px;min-height:80px;display:flex;flex-direction:column;justify-content:space-between}.kpi .v{font-size:30px;line-height:.9;font-weight:300;letter-spacing:-.06em}.kpi .l{color:var(--muted);font-size:11px;margin-top:4px}
.message{min-height:19px;margin-top:8px;font-size:12px}.err{color:var(--red)}.ok-text{color:var(--green)}
.table-wrap{width:100%;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
th{text-align:left;text-transform:uppercase;color:var(--muted);font-size:9px;letter-spacing:.12em;padding:6px 4px;border-bottom:1px solid var(--line);font-weight:900}
td{padding:6px 4px;border-bottom:1px solid rgba(23,54,83,.3);vertical-align:top}
.pill{display:inline-flex;align-items:center;min-height:24px;border:1px solid rgba(49,215,255,.28);padding:4px 7px;color:var(--cyan);font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:900;white-space:nowrap}.pill.ok{color:var(--green);border-color:rgba(45,255,154,.48);background:rgba(45,255,154,.06)}.pill.wait{color:var(--amber);border-color:rgba(255,209,102,.48);background:rgba(255,209,102,.06)}.pill.stop{color:var(--red);border-color:rgba(255,65,109,.48);background:rgba(255,65,109,.06)}.pill.purple{color:var(--purple);border-color:rgba(159,122,234,.52);background:rgba(159,122,234,.08)}
.empty{color:var(--muted);text-align:center;padding:18px;font-size:12px}
.feed{display:grid;gap:6px;max-height:360px;overflow:auto}
.entry{display:grid;grid-template-columns:60px 1fr auto;gap:6px;align-items:center;border-bottom:1px solid rgba(23,54,83,.3);padding:6px 0;font-size:12px}
.entry-time{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.entry-name{font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.callback-list{display:grid;gap:8px}.callback-card{border:1px solid rgba(23,54,83,.78);background:rgba(6,16,27,.64);padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.callback-card b{display:block}.callback-card .meta{color:var(--muted);font-size:11px;margin-top:3px}.hdr-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.modal-overlay{position:fixed;inset:0;z-index:10;background:rgba(2,4,10,.82);backdrop-filter:blur(8px);display:grid;place-items:center;padding:16px}.modal-overlay.hide{display:none!important}.script-modal{width:min(920px,100%);max-height:min(88vh,860px);overflow:auto;border:1px solid var(--line);background:linear-gradient(180deg,rgba(11,22,37,.98),rgba(4,8,15,.98));box-shadow:var(--shadow);padding:16px}.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}.script-block{border:1px solid rgba(23,54,83,.78);background:rgba(6,16,27,.58);padding:12px;margin:8px 0;line-height:1.55;font-size:13px}.script-block h3{margin:0 0 6px;color:var(--cyan);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.script-block ul{margin:6px 0 0;padding-left:18px}.script-block li{margin:5px 0}
.toast{position:fixed;right:18px;bottom:18px;z-index:5;max-width:min(360px,calc(100vw-36px));border:1px solid rgba(45,255,154,.55);background:linear-gradient(180deg,rgba(9,40,32,.96),rgba(4,12,12,.96));box-shadow:0 0 34px rgba(45,255,154,.16);padding:13px 14px;transform:translateY(18px);opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;font-size:13px}.toast.show{opacity:1;transform:translateY(0)}.hide{display:none!important}
@media(max-width:860px){.wrap{padding:12px}.grid{grid-template-columns:1fr}.quick,.stats,.wide,.half{grid-column:auto}.quick{order:1}.stats{order:2}.form-grid{grid-template-columns:1fr}.span2{grid-column:auto}.hdr{align-items:stretch;flex-direction:column}.hdr-actions{display:grid;grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.kpi .v{font-size:26px}.panel{padding:12px}.callback-card{grid-template-columns:1fr}.script-modal{max-height:92vh;padding:12px}}
@media(max-width:520px){.login-card{padding:16px}.wrap{padding:10px}.stats-grid{gap:6px}.kpi{min-height:70px;padding:8px}.kpi .v{font-size:22px}.caller-name{font-size:18px}.entry{grid-template-columns:50px 1fr}.entry .pill{grid-column:2}.chip{width:max-content}table{font-size:11px;min-width:550px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
const BASE="/api",TOK_KEY="lrp_caller_tok",USR_KEY="lrp_caller_usr";
const DISPOSITIONS={voicemail:{label:"Voicemail",cls:"wait"},no_answer:{label:"No Answer",cls:""},talked_interested:{label:"Interested",cls:"ok"},talked_not_interested:{label:"Not Interested",cls:"purple"},callback_set:{label:"Callback Set",cls:"wait"},dnc:{label:"DNC/Wrong Number",cls:"stop"},wrong_number:{label:"Wrong Number",cls:"stop"}};
let token=localStorage.getItem(TOK_KEY)||"",user=safeJson(localStorage.getItem(USR_KEY)),refreshTimer=null,latestCalls=[],callbackProspects=[];
function safeJson(v){try{return v?JSON.parse(v):null}catch{return null}}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function fmtTime(v){if(!v)return"--";const d=new Date(v);return Number.isNaN(d.getTime())?"--":d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
function fmtDate(v){return v.toLocaleDateString([],{weekday:"long",month:"short",day:"numeric"})}
function daysAgo(v){if(!v)return"no contact date";const d=new Date(v);if(Number.isNaN(d.getTime()))return"date unknown";const days=Math.max(0,Math.floor((Date.now()-d.getTime())/86400000));return days===0?"today":days+" day"+(days===1?"":"s")+" ago"}
function pillCls(v){const m=DISPOSITIONS[v]||{cls:""};return m.cls}
function pillLabel(v){const m=DISPOSITIONS[v]||{label:String(v||"Unknown").replace(/_/g," ")};return m.label}
function pill(v){return`<span class="pill ${pillCls(v)}">${esc(pillLabel(v))}</span>`}
function dur(n){const d=Number(n||0);return d?d+"s":"--"}
function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove("show"),2600)}
async function req(p,o={}){const h=new Headers(o.headers);if(token)h.set("Authorization","Bearer "+token);if(o.body&&!(o.body instanceof FormData)&&!h.has("Content-Type"))h.set("Content-Type","application/json");const r=await fetch(BASE+p,{...o,headers:h});let d;try{d=await r.json()}catch{d={}}if(!r.ok){if(r.status===401||r.status===403)logout(false);throw new Error(d.detail||"Request failed")}return d}
function showLogin(m){clearInterval(refreshTimer);document.getElementById("app").innerHTML=`<main class="login-shell"><form class="login-card" id="loginForm"><div class="brand"><span class="brand-dot"></span><span>LeadRescuePro</span></div><h1>Caller Access</h1><p class="fine">Sign in with your SDR username and PIN.</p><div class="field" style="margin-top:16px"><label for="username">Username</label><input id="username" name="username" autocomplete="username" required></div><div class="field" style="margin-top:10px"><label for="pin">PIN</label><input id="pin" name="pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="current-password" required></div><button class="btn btn-full" id="loginBtn" type="submit">Enter Dashboard</button><div class="message err" id="loginMsg">${esc(m)}</div></form></main>`;document.getElementById("loginForm").addEventListener("submit",login);document.getElementById("username").focus()}
async function login(e){e.preventDefault();const btn=document.getElementById("loginBtn"),msg=document.getElementById("loginMsg"),fd=new FormData(e.currentTarget);btn.disabled=true;msg.textContent="";try{const d=await req("/auth/login",{method:"POST",body:fd});token=d.access_token;user=d.user;localStorage.setItem(TOK_KEY,token);localStorage.setItem(USR_KEY,JSON.stringify(user));showDashboard();await loadAll()}catch(err){msg.textContent=err.message||"Invalid credentials"}finally{btn.disabled=false}}
function logout(r){token="";user=null;latestCalls=[];clearInterval(refreshTimer);localStorage.removeItem(TOK_KEY);localStorage.removeItem(USR_KEY);if(r!==false)showLogin()}
function showDashboard(){const name=user&&user.full_name?user.full_name:(user&&user.username?user.username:"Caller");document.getElementById("app").innerHTML=`<div class="wrap"><header class="hdr"><div class="hdr-main"><div class="brand" style="margin:0"><span class="brand-dot"></span><span>LRP Caller</span></div><div class="caller-name">${esc(name)}</div><div class="hdr-meta"><span class="chip" id="todayChip">${fmtDate(new Date())}</span><span class="chip" id="syncChip">Last sync pending</span></div></div><div class="hdr-actions"><button class="btn" type="button" id="scriptsBtn">Scripts &amp; SOP</button><button class="btn btn-red" type="button" id="logoutBtn">Logout</button></div></header><main class="grid"><section class="panel quick"><h2>Quick Call Log</h2><form id="callForm"><div class="form-grid"><div class="field span2"><label for="bizName">Business Name</label><div style="display:flex;gap:4px"><input id="bizName" name="business_name" required autocomplete="organization" placeholder="e.g. Austin Plumbing Co" style="flex:1"><select id="prospectPick" onchange="fillFromProspect()" style="width:auto;min-width:140px;min-height:44px;font-size:11px"><option value="">-- Recent Prospects --</option></select></div></div><div class="field"><label for="phone">Phone</label><input id="phone" name="phone" type="tel" autocomplete="tel"></div><div class="field"><label for="disp">Disposition</label><select id="disp" name="disposition"><option value="voicemail">Voicemail</option><option value="no_answer">No Answer</option><option value="talked_interested">Talked-Interested</option><option value="talked_not_interested">Talked-Not Interested</option><option value="callback_set">Callback Set</option><option value="dnc">DNC/Wrong Number</option></select></div><div class="field"><label for="durSec">Duration (sec)</label><input id="durSec" name="duration_seconds" type="number" min="0" step="1" inputmode="numeric" placeholder="e.g. 45"></div><div class="field span2"><label for="notes">Notes</label><textarea id="notes" name="notes" placeholder="Outcome, gatekeeper, callback time, objections..."></textarea></div></div><button class="btn btn-full btn-gr" id="submitBtn" type="submit">Log Call</button><div class="message" id="formMsg"></div></form></section><section class="panel stats"><h2>Today's Stats</h2><div class="stats-grid"><div class="kpi"><div><div class="v" id="dialsToday" style="color:var(--cyan)">0</div><div class="l">My Dials Today</div></div></div><div class="kpi"><div><div class="v" id="connectsToday" style="color:var(--green)">0</div><div class="l">My Connects</div></div></div><div class="kpi"><div><div class="v" id="dncToday" style="color:var(--red)">0</div><div class="l">My DNC</div></div></div><div class="kpi"><div><div class="v" id="rateToday" style="color:var(--amber)">0%</div><div class="l">My Connect Rate</div></div></div></div><div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)"><h2>All-Time Performance</h2><div class="stats-grid"><div class="kpi"><div><div class="v" id="allDials" style="color:var(--cyan)">0</div><div class="l">Total Dials</div></div></div><div class="kpi"><div><div class="v" id="allConnects" style="color:var(--green)">0</div><div class="l">Total Connects</div></div></div><div class="kpi"><div><div class="v" id="allInterested" style="color:var(--lime)">0</div><div class="l">Total Interested</div></div></div><div class="kpi"><div><div class="v" id="allRate" style="color:var(--purple)">0%</div><div class="l">Avg Connect Rate</div></div></div></div></div></section><section class="panel wide"><h2>Callback Reminders</h2><div class="callback-list" id="callbackList"><div class="empty">Loading callbacks...</div></div></section><section class="panel wide"><h2>Today's Call Log</h2><div class="table-wrap"><table><thead><tr><th>Time</th><th>Business</th><th>Phone</th><th>Disposition</th><th>Duration</th><th>Notes</th></tr></thead><tbody id="callRows"><tr><td colspan="6" class="empty">Loading calls...</td></tr></tbody></table></div></section><section class="panel wide"><h2>My Recent Activity</h2><div class="feed" id="activityFeed"><div class="empty">Loading activity...</div></div></section></main></div>`;document.getElementById("logoutBtn").addEventListener("click",()=>logout(true));document.getElementById("scriptsBtn").addEventListener("click",openScriptsModal);document.getElementById("callForm").addEventListener("submit",submitCall);refreshTimer=setInterval(loadAll,30000);loadProspects()}
async function loadAll(){if(!token||!user)return;try{const[kpi,callsData]=await Promise.all([req("/kpis/caller/"+user.id),req("/calls/today")]);latestCalls=(callsData.calls||[]).slice().sort((a,b)=>new Date(b.call_time)-new Date(a.call_time));renderStats(kpi);renderCalls(latestCalls);renderActivity(latestCalls.slice(0,20));const s=document.getElementById("syncChip");if(s)s.textContent="Last sync "+fmtTime(new Date());loadAllTimePerf();loadCallbackReminders()}catch{const s=document.getElementById("syncChip");if(s)s.textContent="Sync failed"}}
function renderStats(k){document.getElementById("dialsToday").textContent=k.dials_today||0;document.getElementById("connectsToday").textContent=k.connects_today||0;document.getElementById("dncToday").textContent=k.dnc_today||0;document.getElementById("rateToday").textContent=(k.connect_rate||0)+"%"}
function renderCalls(c){const b=document.getElementById("callRows");if(!c||!c.length){b.innerHTML='<tr><td colspan="6" class="empty">No calls logged today</td></tr>';return}b.innerHTML=c.map(x=>`<tr><td>${fmtTime(x.call_time)}</td><td><strong>${esc(x.business_name||"Unknown")}</strong></td><td>${esc(x.phone||"--")}</td><td>${pill(x.disposition)}</td><td>${dur(x.duration_seconds)}</td><td>${esc(x.notes||"")}</td></tr>`).join("")}
function renderActivity(c){const f=document.getElementById("activityFeed");if(!c||!c.length){f.innerHTML='<div class="empty">No recent calls yet</div>';return}f.innerHTML=c.map(x=>`<div class="entry"><div class="entry-time">${fmtTime(x.call_time)}</div><div class="entry-name">${esc(x.business_name||"Unknown")}</div>${pill(x.disposition)}</div>`).join("")}
async function loadCallbackReminders(){const box=document.getElementById("callbackList");if(!box||!user)return;try{const d=await req("/prospects?status=callback_set&assigned="+encodeURIComponent(user.id));const items=(d.prospects||[]).slice().sort((a,b)=>new Date(a.last_contact||0)-new Date(b.last_contact||0));callbackProspects=items;box.innerHTML=items.length?items.map(p=>`<div class="callback-card"><div><b>${esc(p.business_name||"Unnamed business")}</b><div class="meta">${esc(p.phone||"--")} - last contact ${daysAgo(p.last_contact)}</div></div><button class="btn btn-gr" type="button" onclick="callNowById(${Number(p.id)})">Call Now</button></div>`).join(""):'<div class="empty">No callback reminders assigned right now.</div>'}catch(err){box.innerHTML='<div class="empty">Could not load callbacks: '+esc(err.message)+'</div>'}}
function callNowById(id){const p=callbackProspects.find(x=>Number(x.id)===Number(id));if(p)callNow(p.business_name||"",p.phone||"")}
function callNow(name,phone){document.getElementById("bizName").value=name;document.getElementById("phone").value=phone;document.getElementById("disp").value="callback_set";document.getElementById("notes").value="Callback reminder follow-up.";document.getElementById("bizName").focus();toast("Callback loaded into call form")}
function openScriptsModal(){let m=document.getElementById("scriptsModal");if(!m){m=document.createElement("div");m.id="scriptsModal";m.className="modal-overlay";m.innerHTML=`<div class="script-modal" role="dialog" aria-modal="true" aria-label="Scripts and SOP"><div class="modal-head"><div><div class="brand" style="margin:0"><span class="brand-dot"></span><span>Scripts &amp; SOP</span></div><h1>Cold Call Field Guide</h1><p class="fine">Use a calm, casual, confident tone. The goal is permission to send a 3-minute Loom, not to sell on the call.</p></div><button class="btn btn-red" type="button" onclick="closeScriptsModal()">Close</button></div><div class="script-block"><h3>Owner answers</h3><p>"Hi [Name], this is LeadRescuePro Community. I'll be brief - I help plumbing businesses reduce missed-call leakage. Are you the right person to ask how after-hours and overflow calls are handled?"</p></div><div class="script-block"><h3>Gatekeeper</h3><p>"Hi, I'm not calling with an emergency. I'm trying to find who manages call handling or dispatch workflow for [Company]. Who would be best to ask about missed calls and after-hours intake?"</p></div><div class="script-block"><h3>Follow-up</h3><p>"Hi [Name], I'm following up on my note about missed-call intake. The only reason I reached out is that plumbing callers often call the next company if voicemail picks up. Worth a 2-minute compare of your current process?"</p></div><div class="script-block"><h3>After each call</h3><ul><li>Ask: "About how often do calls hit voicemail during the week?"</li><li>Ask: "Who decides if a call is urgent enough for immediate dispatch?"</li><li>Close: "If you want, I can show you the missed-call intake flow we use - if it's not relevant, no problem."</li></ul></div><div class="script-block"><h3>Your Daily Workflow</h3><ul><li>Log in before shift and confirm the dashboard is syncing.</li><li>Review the lead before dialing: business name, city, website, score, and notes.</li><li>Execute 100-150 quality dials per day during US business hours.</li><li>Update statuses instantly: voicemail, no answer, interested, callback, DNC, wrong number.</li><li>Send an EOD report with dials, connects, interested conversations, callbacks, DNC count, and blockers.</li></ul></div><div class="script-block"><h3>Core Mindset</h3><ul><li>Low-pressure approach: you are asking if a short Loom is useful, not forcing a meeting.</li><li>Sound calm, casual, and confident, like a peer who understands plumbing operators.</li><li>Keep calls brief. Respect time. If they are busy, ask for permission to send the video.</li><li>Protect the brand: no fake proof, no pressure, no promises beyond the LeadRescuePro offer.</li></ul></div><div class="script-block"><h3>Objections</h3><ul><li><b>"Just email info."</b> "The video I recorded actually pulls up your specific website and shows where missed calls usually leak. What's the best number or email to send that link?"</li><li><b>"Is this AI?"</b> "This is completely new conversational voice tech that breathes and pauses naturally, but the quick video will make it easier to judge for yourself."</li><li><b>"We don't miss calls."</b> "That may be true during office hours. The video focuses on what happens at 8PM, weekends, or during peak hours when dispatch is tied up."</li><li><b>"I don't have time."</b> "That's why I'm not asking for a meeting. I just want to drop a link. If it is not relevant, you can ignore it."</li></ul></div></div>`;m.addEventListener("click",e=>{if(e.target===m)closeScriptsModal()});document.body.appendChild(m)}m.classList.remove("hide")}
function closeScriptsModal(){const m=document.getElementById("scriptsModal");if(m)m.classList.add("hide")}
async function submitCall(e){e.preventDefault();const form=e.currentTarget,btn=document.getElementById("submitBtn"),msg=document.getElementById("formMsg"),fd=new FormData(form);const payload={business_name:String(fd.get("business_name")||"").trim(),phone:String(fd.get("phone")||"").trim(),disposition:fd.get("disposition")||"voicemail",duration_seconds:Number(fd.get("duration_seconds")||0),notes:String(fd.get("notes")||"").trim()};if(!payload.business_name){msg.className="message err";msg.textContent="Business name is required.";return}btn.disabled=true;msg.className="message";msg.textContent="Logging call...";try{await req("/calls/log",{method:"POST",body:JSON.stringify(payload)});form.reset();document.getElementById("disp").value="voicemail";msg.className="message ok-text";msg.textContent="Call logged.";toast("Call logged successfully");await loadAll();document.getElementById("bizName").focus()}catch(err){msg.className="message err";msg.textContent=err.message||"Could not log call."}finally{btn.disabled=false}}
async function loadAllTimePerf(){try{const d=await req("/callers/"+user.id+"/performance");const el=(id)=>document.getElementById(id);if(el("allDials"))el("allDials").textContent=d.total_dials||0;if(el("allConnects"))el("allConnects").textContent=d.total_connects||0;if(el("allInterested"))el("allInterested").textContent=d.total_interested||0;if(el("allRate"))el("allRate").textContent=(d.avg_connect_rate||0)+"%"}catch{}}
async function loadProspects(){try{const d=await req("/prospects?limit=20");const p=d.prospects||[];const s=document.getElementById("prospectPick");if(!s)return;s.innerHTML='<option value="">-- Recent Prospects --</option>'+p.map(x=>'<option value="'+esc(x.id)+'" data-name="'+esc(x.business_name||"")+'" data-phone="'+esc(x.phone||"")+'">'+esc(x.business_name||"Unnamed")+' ('+esc(x.city||"")+')</option>').join("")}catch{}}
function fillFromProspect(){const s=document.getElementById("prospectPick");if(!s||!s.value)return;const opt=s.options[s.selectedIndex];document.getElementById("bizName").value=opt.getAttribute("data-name")||"";document.getElementById("phone").value=opt.getAttribute("data-phone")||""}
async function boot(){if(!token){showLogin();return}if(!user){try{user=await req("/auth/me");localStorage.setItem(USR_KEY,JSON.stringify(user))}catch{showLogin("Session expired. Please sign in again.");return}}showDashboard();loadAll()}
boot();
</script>
</body>
