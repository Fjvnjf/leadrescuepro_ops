<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LRP Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,700;9..40,900&display=swap" rel="stylesheet">
<style>
:root{--bg:#02040a;--panel:#07101b;--panel2:#0b1625;--glass:rgba(10,22,38,.74);--line:#173653;--line2:#245b82;--text:#e8f7ff;--muted:#7d9bb7;--blue:#1c69d4;--cyan:#31d7ff;--lime:#b7ff36;--green:#2dff9a;--amber:#ffd166;--red:#ff416d;--purple:#9f7aea;--shadow:0 0 42px rgba(49,215,255,.12),inset 0 0 38px rgba(28,105,212,.04);font-family:'DM Sans',system-ui,-apple-system,sans-serif}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -12%,rgba(28,105,212,.42),transparent 34rem),radial-gradient(circle at 88% 18%,rgba(49,215,255,.16),transparent 24rem),linear-gradient(180deg,#02040a,#050a12 58%,#02040a);color:var(--text);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(49,215,255,.035)1px,transparent 1px),linear-gradient(90deg,rgba(49,215,255,.03)1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at center,black,transparent 78%)}
.wrap{max-width:1440px;margin:0 auto;padding:18px}.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.logo{font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:12px;color:var(--cyan);display:flex;align-items:center;gap:8px}
.logo-dot{width:10px;height:10px;border:1px solid var(--cyan);box-shadow:0 0 16px rgba(49,215,255,.55),0 0 6px rgba(49,215,255,.15);background:rgba(49,215,255,.18)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;margin-top:8px}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(11,22,37,.88),rgba(4,8,15,.9));padding:14px;box-shadow:var(--shadow)}.p3{grid-column:span 3}.p4{grid-column:span 4}.p5{grid-column:span 5}.p6{grid-column:span 6}.p7{grid-column:span 7}.p8{grid-column:span 8}.p9{grid-column:span 9}.p12{grid-column:span 12}
h2{margin:0 0 8px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#bfefff}.h3{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin:0 0 6px}
.metric{font-size:30px;line-height:.9;font-weight:300;letter-spacing:-.06em}.metric-lg{font-size:48px}.label{color:var(--muted);font-size:11px;margin-top:4px}
.pill{display:inline-flex;align-items:center;min-height:22px;border:1px solid rgba(49,215,255,.28);padding:3px 7px;color:var(--cyan);font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:900;white-space:nowrap}.pill.ok{color:var(--green);border-color:rgba(45,255,154,.48);background:rgba(45,255,154,.06)}.pill.wait{color:var(--amber);border-color:rgba(255,209,102,.48);background:rgba(255,209,102,.06)}.pill.stop{color:var(--red);border-color:rgba(255,65,109,.48);background:rgba(255,65,109,.06)}.pill.purple{color:var(--purple);border-color:rgba(159,122,234,.52);background:rgba(159,122,234,.08)}
table{width:100%;border-collapse:collapse;font-size:11px}th{text-align:left;text-transform:uppercase;color:var(--muted);font-size:9px;letter-spacing:.12em;padding:5px 4px;border-bottom:1px solid var(--line);font-weight:900}td{padding:5px 4px;border-bottom:1px solid rgba(23,54,83,.3)}
.btn{min-height:44px;border:1px solid rgba(49,215,255,.42);background:rgba(49,215,255,.08);color:var(--cyan);padding:8px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.12em;font-size:10px;font-weight:900;border-radius:0;font-family:inherit;display:inline-flex;align-items:center;gap:4px;justify-content:center}.btn:hover{background:rgba(49,215,255,.16);border-color:var(--cyan)}.btn:disabled{opacity:.5;cursor:wait}.btn-gr{color:var(--green);border-color:rgba(45,255,154,.45);background:rgba(45,255,154,.06)}.btn-gr:hover{background:rgba(45,255,154,.13);border-color:var(--green)}.btn-rd{color:var(--red);border-color:rgba(255,65,109,.45);background:rgba(255,65,109,.06)}.btn-rd:hover{background:rgba(255,65,109,.13);border-color:var(--red)}.btn-full{width:100%}
input,textarea,select{background:#06101b;border:1px solid var(--line);color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;width:100%;border-radius:0;outline:none;min-height:40px}input:focus,select:focus,textarea:focus{border-color:rgba(49,215,255,.7);box-shadow:0 0 0 2px rgba(49,215,255,.08)}textarea{min-height:80px;resize:vertical}
.log-roll{max-height:280px;overflow-y:auto}
.entry{padding:5px 0;border-bottom:1px solid rgba(23,54,83,.3);font-size:11px}.entry .t{color:var(--muted);font-size:9px}.entry .b{font-weight:700}.entry .n{color:var(--muted);font-size:10px}
.statusbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;font-size:9px}
.chip{display:inline-flex;align-items:center;min-height:26px;border:1px solid rgba(49,215,255,.32);background:rgba(49,215,255,.07);padding:4px 8px;color:var(--cyan);font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:900}
.chip.ok{color:var(--green);border-color:rgba(45,255,154,.45);background:rgba(45,255,154,.06)}.chip.stop{color:var(--red);border-color:rgba(255,65,109,.45);background:rgba(255,65,109,.06)}
.table-wrap{width:100%;overflow-x:auto}
.empty{color:var(--muted);text-align:center;padding:24px;font-size:12px}.toast{position:fixed;right:18px;bottom:18px;z-index:9;max-width:min(360px,calc(100vw-36px));border:1px solid rgba(45,255,154,.55);background:linear-gradient(180deg,rgba(9,40,32,.96),rgba(4,12,12,.96));box-shadow:0 0 34px rgba(45,255,154,.16);padding:13px 14px;transform:translateY(18px);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;font-size:13px}.toast.show{opacity:1;transform:translateY(0)}
.hide{display:none!important}
.login-shell{min-height:100vh;display:grid;place-items:center;padding:18px}
.login-card{width:min(100%,390px);border:1px solid var(--line);background:linear-gradient(180deg,rgba(11,22,37,.9),rgba(4,8,15,.94));box-shadow:var(--shadow);padding:24px}
.tabs{display:flex;gap:3px;margin:8px 0;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;min-height:44px;padding:6px 10px;border:1px solid var(--line);cursor:pointer;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900;white-space:nowrap;transition:all .12s;display:flex;align-items:center}
.tab.active{color:#fff;border-color:var(--cyan);background:rgba(49,215,255,.08)}.tab:hover{color:#fff;border-color:var(--cyan)}
.bar-w{height:6px;border:1px solid var(--line);background:#06101b;position:relative;border-radius:2px}.bar-w i{display:block;height:100%;border-radius:2px;background:var(--cyan)}.bar-w i.gr{background:var(--green)}.bar-w i.rd{background:var(--red)}.bar-w i.am{background:var(--amber)}
.kpi-mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:10px}.kpi-item{border:1px solid rgba(23,54,83,.78);background:rgba(6,16,27,.64);padding:10px;display:flex;flex-direction:column;justify-content:space-between;min-height:70px}.kpi-item .v{font-size:22px;line-height:.9;font-weight:300}.kpi-item .l{color:var(--muted);font-size:10px;margin-top:4px}
.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin:8px 0}.stage-actions{display:flex;gap:4px;flex-wrap:wrap}.stage-actions .btn{min-height:32px;padding:5px 7px;font-size:8px}.funnel{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.funnel-card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(11,22,37,.92),rgba(3,7,13,.94));padding:16px;min-height:190px}.funnel-card .big{font-size:44px;font-weight:300;letter-spacing:-.06em}.funnel-card .sub{color:var(--muted);font-size:12px;line-height:1.45}.inline-edit{display:grid;grid-template-columns:minmax(130px,1fr) minmax(180px,2fr) auto;gap:6px;align-items:center}.mini-btn{min-height:32px;padding:5px 8px;font-size:8px}.loom-sent{color:var(--green);border-color:rgba(45,255,154,.55);background:rgba(45,255,154,.08)}
@media(max-width:860px){.grid{grid-template-columns:1fr}.p3,.p4,.p5,.p6,.p7,.p8,.p9,.p12{grid-column:auto}.wrap{padding:12px}.metric{font-size:26px}.metric-lg{font-size:36px}.prop-grid{grid-template-columns:1fr}.tabs{gap:2px}.tab{padding:5px 8px;font-size:8px}}
@media(max-width:860px){.funnel{grid-template-columns:1fr}.inline-edit{grid-template-columns:1fr}}
@media(max-width:520px){.wrap{padding:10px}.metric{font-size:22px}.metric-lg{font-size:30px}.hdr{gap:6px}.login-card{padding:16px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
const BASE="/api",TOK_KEY="lrp_admin_tok",USR_KEY="lrp_admin_usr";
let token=localStorage.getItem(TOK_KEY)||"",user=safeJson(localStorage.getItem(USR_KEY)),refreshTimer=null,activeTab="overview",callerMap={};
function safeJson(v){try{return v?JSON.parse(v):null}catch{return null}}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function ts(d){if(!d)return"--";d=typeof d=="string"?new Date(d):d;return Number.isNaN(d.getTime())?"--":d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
function ds(d){if(!d)return"--";d=typeof d=="string"?new Date(d):d;return Number.isNaN(d.getTime())?"--":d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove("show"),2600)}
async function req(p,o={}){const h=new Headers(o.headers);if(token)h.set("Authorization","Bearer "+token);if(o.body&&!(o.body instanceof FormData)&&!h.has("Content-Type"))h.set("Content-Type","application/json");const r=await fetch(BASE+p,{...o,headers:h});let d;try{d=await r.json()}catch{d={}}if(!r.ok){if(r.status===401||r.status===403){logout(false)}throw new Error(d.detail||"Request failed")}return d}
function showLogin(m){clearInterval(refreshTimer);document.getElementById("app").innerHTML=`<main class="login-shell"><form class="login-card" id="loginForm"><div class="logo" style="margin:0"><span class="logo-dot"></span><span>LRP Command</span></div><h1 style="font-size:22px;line-height:1;margin:10px 0 4px;font-weight:700;letter-spacing:-.03em">Admin Access</h1><p style="color:var(--muted);font-size:12px;margin:0 0 14px">Enter your admin PIN to access the command center.</p><div class="field" style="margin-bottom:10px"><label for="lu" style="font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:900;display:block;margin-bottom:4px">Username</label><input id="lu" name="username" autocomplete="username" required style="min-height:44px"></div><div class="field" style="margin-bottom:14px"><label for="lp" style="font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:900;display:block;margin-bottom:4px">PIN</label><input id="lp" name="pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="current-password" required style="min-height:44px"></div><button class="btn btn-full" id="loginBtn" type="submit" style="min-height:44px">Enter Command Center</button><div class="message" id="loginMsg" style="min-height:19px;margin-top:8px;font-size:12px;color:var(--red)"></div></form></main>`;document.getElementById("loginForm").addEventListener("submit",login);document.getElementById("lu").focus();if(m)document.getElementById("loginMsg").textContent=m}
async function login(e){e.preventDefault();const btn=document.getElementById("loginBtn"),msg=document.getElementById("loginMsg"),fd=new FormData(e.currentTarget);btn.disabled=true;msg.textContent="";try{const d=await req("/auth/login",{method:"POST",body:fd});token=d.access_token;user=d.user;localStorage.setItem(TOK_KEY,token);localStorage.setItem(USR_KEY,JSON.stringify(user));showDashboard();loadAll()}catch(err){msg.textContent=err.message||"Invalid credentials"}finally{btn.disabled=false}}
function logout(r){token="";user=null;clearInterval(refreshTimer);localStorage.removeItem(TOK_KEY);localStorage.removeItem(USR_KEY);if(r!==false)showLogin()}
function pill(v,c){const m={voicemail:"Voicemail",no_answer:"No Answer",talked_interested:"Interested",talked_not_interested:"Not Interested",callback_set:"Callback Set",dnc:"DNC",wrong_number:"Wrong Number"};const cl={voicemail:"wait",talked_interested:"ok",talked_not_interested:"purple",callback_set:"wait",dnc:"stop",wrong_number:"stop"};return`<span class="pill ${cl[v]||""}">${esc(m[v]||v)}</span>`}
function dur(n){const d=Number(n||0);return d?d+"s":"--"}
function showDashboard(){document.getElementById("app").innerHTML=`<div class="wrap"><div class="hdr"><div class="logo"><span class="logo-dot"></span><span>LRP Command</span></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span id="liveTime" style="font-size:10px;color:var(--muted)">--</span><button class="btn btn-gr" onclick="toggleQuickLog()" id="quickLogBtn">+ Quick Log</button><button class="btn" onclick="logout()">Logout</button></div></div><div id="quickLogPanel" class="hide" style="border:1px solid rgba(49,215,255,.42);background:rgba(11,22,37,.95);padding:12px;margin-bottom:8px"><form id="quickLogForm" style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:end"><div><label style="font-size:9px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:2px">Business</label><input id="qlName" placeholder="Business name" style="min-height:44px;font-size:11px"></div><div><label style="font-size:9px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:2px">Phone</label><input id="qlPhone" placeholder="Phone" style="min-height:44px;font-size:11px"></div><div><label style="font-size:9px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:2px">Disposition</label><select id="qlDisp" style="min-height:44px;font-size:11px"><option value="voicemail">Voicemail</option><option value="no_answer">No Answer</option><option value="talked_interested">Interested</option><option value="talked_not_interested">Not Interested</option><option value="callback_set">Callback</option><option value="dnc">DNC</option></select></div><button class="btn btn-gr" type="submit" style="font-size:10px">Log</button></form><div id="qlMsg" style="font-size:11px;margin-top:4px;min-height:16px"></div></div><div class="statusbar"><span class="chip ok" id="apiStat">API OK</span><span class="chip" id="todayChip">--</span><span class="chip ok" id="callerChip">0 callers</span><span class="chip" id="dailySumChip" style="cursor:pointer;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Click for daily summary">Daily Summary...</span></div><div class="tabs" id="tabBar"><div class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div><div class="tab" data-tab="prospects" onclick="switchTab('prospects')">Prospects</div><div class="tab" data-tab="callers" onclick="switchTab('callers')">Callers</div><div class="tab" data-tab="commissions" onclick="switchTab('commissions')">Commissions</div><div class="tab" data-tab="weekly" onclick="switchTab('weekly')">Weekly</div><div class="tab" data-tab="logcall" onclick="switchTab('logcall')">Log Call</div><div class="tab" data-tab="clients" onclick="switchTab('clients')">Clients</div><div class="tab" data-tab="sdrhiring" onclick="switchTab('sdrhiring')">SDR Hiring</div><div class="tab" data-tab="pipeline" onclick="switchTab('pipeline')">Pipeline</div></div><div id="mainContent"><div class="empty">Loading command center...</div></div></div>`;refreshTimer=setInterval(()=>{if(activeTab==="overview")loadAll()},60000);loadAll();document.getElementById("quickLogForm").addEventListener("submit",submitQuickLog)}
function switchTab(tab){activeTab=tab;document.querySelectorAll("#tabBar .tab").forEach(t=>t.classList.remove("active"));const el=document.querySelector(`#tabBar .tab[data-tab="${tab}"]`);if(el)el.classList.add("active");loadActiveTab()}
function loadActiveTab(){const m={overview:loadAll,prospects:loadProspects,callers:loadCallers,commissions:loadCommissions,weekly:loadWeekly,logcall:loadLogCall,clients:loadClients,sdrhiring:loadSdrHiring,pipeline:loadPipeline};(m[activeTab]||loadAll)()}
async function loadAll(){if(!token||!user)return;try{const kpi=await req("/kpis/dashboard");renderOverview(kpi);document.getElementById("todayChip").textContent=new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});document.getElementById("callerChip").textContent=kpi.callers_online+" caller"+(kpi.callers_online!==1?"s":"")+" active";document.getElementById("liveTime").textContent=ts();document.getElementById("apiStat").textContent="API OK";document.getElementById("apiStat").className="chip ok";loadDailySummary()}catch{const s=document.getElementById("apiStat");if(s){s.textContent="API DOWN";s.className="chip stop"}}}
async function loadDailySummary(){try{const d=await req("/kpis/daily-summary");const c=document.getElementById("dailySumChip");if(c&&d.text_block){c.textContent=d.text_block;c.title=d.text_block;c.onclick=function(){toast(d.text_block)}}}catch{}}
function renderOverview(kpi){if(activeTab!=="overview")return;const e=document.getElementById("mainContent");const connR=kpi.dials_today>0?(kpi.connects_today/kpi.dials_today*100).toFixed(1):0;const dncR=kpi.dials_today>0?(kpi.dnc_today/kpi.dials_today*100).toFixed(1):0;const intr=kpi.dials_today>0?(kpi.looms_sent_today/kpi.dials_today*100).toFixed(1):0;e.innerHTML=`<div class="grid"><div class="panel p3"><h2>Dials</h2><div class="metric" style="color:var(--cyan)">${kpi.dials_today}</div><div class="label">Today / target: 100</div></div><div class="panel p3"><h2>Connects</h2><div class="metric" style="color:var(--green)">${kpi.connects_today}</div><div class="label">Rate: ${connR}%</div></div><div class="panel p3"><h2>Interested</h2><div class="metric" style="color:var(--lime)">${kpi.looms_sent_today}</div><div class="label">${intr}% of dials</div></div><div class="panel p3"><h2>DNC</h2><div class="metric" style="color:${dncR>20?"var(--red)":dncR>15?"var(--amber)":"var(--green)"}">${kpi.dnc_today}</div><div class="label">${dncR}% (target <15%)</div></div><div class="panel p12" id="dailySumPanel" style="border-color:rgba(49,215,255,.42);background:rgba(49,215,255,.04)"><h2>Daily Summary</h2><div id="dailySumText" style="font-size:13px;line-height:1.5;color:#e8f7ff">Loading summary...</div></div><div class="panel p8"><h2>Top Callers Today</h2><div id="topCallers">${kpi.top_callers&&kpi.top_callers.length?kpi.top_callers.map(c=>`<div class="entry"><b>${esc(c.name)}</b> — ${c.dials} dials, ${c.connects} connects (${c.connect_rate}%)</div>`).join(""):'<div class="empty">No callers active today</div>'}</div></div><div class="panel p4"><h2>Dispositions</h2>${kpi.calls_by_disposition&&Object.keys(kpi.calls_by_disposition).length?Object.entries(kpi.calls_by_disposition).map(([k,v])=>`<div class="entry"><span class="b">${esc(k)}</span> <span class="t">${v} calls</span></div>`).join(""):'<div class="empty">No calls today</div>'}</div><div class="panel p12"><h2>Recent Activity</h2><div class="log-roll" id="actList">${kpi.recent_activity&&kpi.recent_activity.length?kpi.recent_activity.slice(0,20).map(a=>`<div class="entry"><span class="t">${ts(a.time)}</span> <b>${esc(a.caller_name)}</b> → ${esc(a.business_name)} ${pill(a.disposition)} ${a.duration?"("+a.duration+"s)":""}</div>`).join(""):'<div class="empty">No activity today'}</div><div style="margin-top:8px"><button class="btn btn-gr" onclick="exportCalls()">Export Today's Calls (CSV)</button></div></div></div>`;fetchDailySummaryForOverview()}
function loadProspects(){if(activeTab!=="prospects")return;Promise.all([req("/prospects?limit=200"),req("/callers").catch(()=>({callers:[]}))]).then(([d,c])=>{callerMap=Object.fromEntries((c.callers||[]).map(x=>[x.id,x.full_name||x.username||("Caller #"+x.id)]));const e=document.getElementById("mainContent");e.innerHTML=`<div class="grid"><div class="panel p12"><h2>Prospect Database (${d.total||0})</h2><div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap"><input id="psSearch" placeholder="Search..." style="flex:1;min-width:120px" oninput="searchProspects()"><select id="psFilter" onchange="searchProspects()" style="width:auto;min-width:100px"><option value="">All</option><option value="pending">Pending</option><option value="called">Called</option><option value="contacted">Contacted</option><option value="callback_set">Callback Set</option><option value="dnc">DNC</option></select></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Phone</th><th>City</th><th>Score</th><th>Status</th><th>Assigned To</th><th>Loom</th><th>Last Contact</th></tr></thead><tbody id="prospectBody"></tbody></table></div></div></div>`;renderProspects(d.prospects||[])})}
function renderProspects(p){const t=document.getElementById("prospectBody");if(!t)return;t.innerHTML=p.length?p.map(x=>`<tr><td><b>${esc(x.business_name)}</b></td><td>${esc(x.phone||"--")}</td><td>${esc(x.city||"--")}</td><td style="color:${x.score==="A"?"var(--green)":x.score==="B"?"var(--amber)":"var(--red)"}">${esc(x.score||"N/A")}</td><td>${esc(x.status||"pending")}</td><td>${esc(callerMap[x.assigned_to]||"--")}</td><td><button class="btn mini-btn ${x.loom_sent?"loom-sent":"btn-gr"}" onclick="toggleLoom(${x.id},${x.loom_sent?"false":"true"})">${x.loom_sent?"Loom Sent ✓":"Send Loom"}</button></td><td>${x.last_contact?ds(x.last_contact):"--"}</td></tr>`).join(""):'<tr><td colspan="8" class="empty">No prospects found</td></tr>'}
function searchProspects(){const q=document.getElementById("psSearch").value,s=document.getElementById("psFilter").value;let u="/prospects?limit=200";if(q)u+="&search="+encodeURIComponent(q);if(s)u+="&status="+s;req(u).then(d=>renderProspects(d.prospects||[]))}
function toggleLoom(id,v){req("/prospects/"+id,{method:"PATCH",body:JSON.stringify({loom_sent:v})}).then(()=>{toast(v?"Loom marked sent":"Loom reset");loadProspects()}).catch(err=>toast(err.message))}
function loadCallers(){if(activeTab!=="callers")return;req("/callers").then(d=>{const e=document.getElementById("mainContent");e.innerHTML=`<div class="grid"><div class="panel p12"><h2>Caller Management</h2><div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;margin-bottom:10px"><input id="ncUser" placeholder="Username"><input id="ncName" placeholder="Full Name"><input id="ncPin" placeholder="PIN" maxlength="4" value="1234"><button class="btn btn-gr" onclick="addCaller()">+ Add</button></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Username</th><th>Status</th></tr></thead><tbody id="callerBody"></tbody></table></div></div></div>`;const cs=d.callers||[];document.getElementById("callerBody").innerHTML=cs.length?cs.map(c=>`<tr><td><b>${esc(c.full_name||c.username)}</b></td><td>${esc(c.username)}</td><td><span class="pill ok">Active</span></td></tr>`).join(""):'<tr><td colspan="3" class="empty">No callers yet. Add one above.</td></tr>'})}
function addCaller(){const u=document.getElementById("ncUser").value,n=document.getElementById("ncName").value,p=document.getElementById("ncPin").value;if(!u){alert("Username required");return}req("/callers",{method:"POST",body:JSON.stringify({username:u,full_name:n,pin:p})}).then(d=>{if(d.detail){alert(d.detail);return}toast("Caller added: "+d.username);loadCallers();document.getElementById("ncUser").value="";document.getElementById("ncName").value=""})}
function loadCommissions(){if(activeTab!=="commissions")return;Promise.all([req("/commissions/summary"),req("/commissions")]).then(([s,d])=>{const e=document.getElementById("mainContent");e.innerHTML=`<div class="grid"><div class="panel p6"><h2>Commission Summary</h2>${s.summary&&s.summary.length?s.summary.map(c=>`<div class="entry"><b>${esc(c.name)}</b> — ${c.total_deals} deals, $${c.total_commission} (${c.paid_count} paid)</div>`).join(""):'<div class="empty">No commissions yet</div>'}<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)"><span style="color:var(--cyan);font-size:20px;font-weight:300">Total: $${s.grand_total||0}</span></div></div><div class="panel p6"><h2>All Commissions</h2><div class="table-wrap"><table><thead><tr><th>Caller</th><th>Deal</th><th>Commission</th><th>Status</th><th>Date</th></tr></thead><tbody id="commBody"></tbody></table></div></div></div>`;document.getElementById("commBody").innerHTML=d.commissions&&d.commissions.length?d.commissions.map(c=>`<tr><td>Caller #${c.caller_id}</td><td>$${c.deal_amount}</td><td style="color:var(--green)">$${c.commission_amount}</td><td><span class="pill ${c.status==="paid"?"ok":"wait"}">${esc(c.status)}</span></td><td>${c.deal_date?ds(c.deal_date):"--"}</td></tr>`).join(""):'<tr><td colspan="5" class="empty">No commissions</td></tr>'})}
function loadWeekly(){if(activeTab!=="weekly")return;req("/kpis/weekly").then(d=>{const e=document.getElementById("mainContent");const days=d.days||[];const maxD=Math.max(...days.map(x=>x.dials),1);e.innerHTML=`<div class="grid"><div class="panel p12"><h2>Weekly Performance</h2><div class="kpi-mini">${days.map(x=>`<div class="kpi-item"><div><div class="v" style="color:var(--cyan)">${x.dials}</div><div class="l">${x.day} ${x.date.slice(5)}</div></div><div class="bar-w"><i class="${x.dials/maxD>.7?"gr":x.dials/maxD>.4?"":"am"}" style="width:${(x.dials/maxD*100).toFixed(0)}%"></i></div><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:4px"><span>${x.connects} connects</span><span>${x.dnc} DNC</span></div></div>`).join("")}</div></div></div>`})}
function loadLogCall(){if(activeTab!=="logcall")return;const e=document.getElementById("mainContent");e.innerHTML=`<div class="grid"><div class="panel p6"><h2>Log a Call</h2><form id="logCallForm"><div class="field" style="margin-bottom:8px"><label style="font-size:10px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px">Business Name</label><input id="lcName" required placeholder="e.g. Austin Plumbing Co"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div class="field"><label style="font-size:10px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px">Phone</label><input id="lcPhone" placeholder="555-0100"></div><div class="field"><label style="font-size:10px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px">Disposition</label><select id="lcDisp"><option value="voicemail">Voicemail</option><option value="no_answer">No Answer</option><option value="talked_interested">Talked-Interested</option><option value="talked_not_interested">Talked-Not Interested</option><option value="callback_set">Callback Set</option><option value="dnc">DNC</option></select></div></div><div class="field" style="margin-bottom:8px"><label style="font-size:10px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px">Notes</label><textarea id="lcNotes" placeholder="Outcome, callback time, gatekeeper info..."></textarea></div><button class="btn btn-full btn-gr" type="submit">Log Call</button><div id="lcMsg" style="margin-top:8px;font-size:12px"></div></form></div></div>`;document.getElementById("logCallForm").addEventListener("submit",async function(ev){ev.preventDefault();const btn=ev.currentTarget.querySelector("button"),msg=document.getElementById("lcMsg");btn.disabled=true;msg.textContent="Logging...";try{const d=await req("/calls/log",{method:"POST",body:JSON.stringify({business_name:document.getElementById("lcName").value.trim(),phone:document.getElementById("lcPhone").value.trim(),disposition:document.getElementById("lcDisp").value,notes:document.getElementById("lcNotes").value.trim()})});msg.style.color="var(--green)";msg.textContent="Call logged! ID: "+d.id;document.getElementById("lcName").value="";document.getElementById("lcPhone").value="";document.getElementById("lcNotes").value="";toast("Call logged successfully")}catch(err){msg.style.color="var(--red)";msg.textContent=err.message}finally{btn.disabled=false}})}
function clientBusiness(c){return c.business_name||c.company_name||""}function clientOwner(c){return c.owner_name||c.contact_name||""}
function loadClients(){if(activeTab!=="clients")return;req("/clients").then(d=>{const clients=d.clients||[];const active=clients.filter(c=>["active","trial"].includes(c.subscription_status)).length;const mrr=clients.filter(c=>c.subscription_status==="active").reduce((s,c)=>s+Number(c.monthly_revenue||499),0);const setup=clients.reduce((s,c)=>s+Number(c.setup_fee||997),0);document.getElementById("mainContent").innerHTML=`<div class="grid"><div class="panel p4"><h2>Total MRR</h2><div class="metric" style="color:var(--green)">$${mrr.toLocaleString()}</div><div class="label">Active subscriptions</div></div><div class="panel p4"><h2>Total Setup</h2><div class="metric" style="color:var(--cyan)">$${setup.toLocaleString()}</div><div class="label">$997 setup reference</div></div><div class="panel p4"><h2>Active Clients</h2><div class="metric" style="color:var(--lime)">${active}</div><div class="label">${clients.length} total clients</div></div><div class="panel p12"><h2>Clients</h2><button class="btn btn-gr" onclick="toggleClientForm()">+ Add Client</button><form id="clientForm" class="hide form-row"><input name="business_name" placeholder="Company" required><input name="owner_name" placeholder="Owner"><input name="phone" placeholder="Phone"><input name="email" placeholder="Email"><input name="city" placeholder="City"><input name="state" placeholder="State"><select name="subscription_status"><option value="trial">Trial</option><option value="active">Active</option><option value="paused">Paused</option><option value="cancelled">Cancelled</option><option value="churned">Churned</option></select><button class="btn btn-gr" type="submit">Create</button></form><div class="table-wrap"><table><thead><tr><th>Company</th><th>Owner</th><th>Phone</th><th>Onboarding Stage</th><th>Status</th><th>Setup Fee</th><th>Monthly Rev</th><th>Notes</th></tr></thead><tbody>${clients.length?clients.map(c=>clientRow(c)).join(""):'<tr><td colspan="8" class="empty">No clients yet</td></tr>'}</tbody></table></div></div></div>`;document.getElementById("clientForm").addEventListener("submit",createClient)})}
function clientRow(c){const stage=c.onboarding_stage||c.onboarding_progress||"new";return`<tr onclick="document.getElementById('clientEdit${c.id}').classList.toggle('hide')"><td><b>${esc(clientBusiness(c))}</b><div class="label">${esc(c.city||"")}</div></td><td>${esc(clientOwner(c)||"--")}</td><td>${esc(c.phone||"--")}</td><td>${esc(stage)}</td><td><span class="pill ${c.subscription_status==="active"?"ok":c.subscription_status==="cancelled"||c.subscription_status==="churned"?"stop":"wait"}">${esc(c.subscription_status||"trial")}</span></td><td>$${Number(c.setup_fee||997).toLocaleString()}</td><td>$${Number(c.monthly_revenue||499).toLocaleString()}</td><td>${esc(c.notes||"")}</td></tr><tr id="clientEdit${c.id}" class="hide"><td colspan="8"><div class="inline-edit"><select id="clientStage${c.id}"><option value="new">new</option><option value="call_handling_setup">call_handling_setup</option><option value="voicemail_config">voicemail_config</option><option value="calendar_sync">calendar_sync</option><option value="live_testing">live_testing</option><option value="active">active</option></select><input id="clientNotes${c.id}" value="${esc(c.notes||"")}" placeholder="Notes"><button class="btn btn-gr" onclick="saveClient(${c.id});event.stopPropagation()">Save</button></div></td></tr>`}
function toggleClientForm(){document.getElementById("clientForm").classList.toggle("hide")}
function createClient(e){e.preventDefault();const p=Object.fromEntries(new FormData(e.currentTarget).entries());req("/clients",{method:"POST",body:JSON.stringify(p)}).then(()=>{toast("Client added");loadClients()}).catch(err=>toast(err.message))}
function saveClient(id){req("/clients/"+id,{method:"PATCH",body:JSON.stringify({onboarding_stage:document.getElementById("clientStage"+id).value,notes:document.getElementById("clientNotes"+id).value})}).then(()=>{toast("Client updated");loadClients()}).catch(err=>toast(err.message))}
function loadSdrHiring(){if(activeTab!=="sdrhiring")return;req("/sdr-candidates").then(d=>{const candidates=d.candidates||[];document.getElementById("mainContent").innerHTML=`<div class="grid"><div class="panel p12"><h2>SDR Hiring Pipeline</h2><form id="candidateForm" class="form-row"><input name="name" placeholder="Name" required><input name="email" placeholder="Email"><input name="phone" placeholder="Phone"><input name="country" placeholder="Country" value="Bangladesh"><select name="source"><option value="facebook">Facebook</option><option value="upwork">Upwork</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="manual">Manual</option><option value="other">Other</option></select><button class="btn btn-gr" type="submit">Add Candidate</button></form><div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Country</th><th>Stage</th><th>Source</th><th>Applied</th><th>Progress</th><th>Reject</th><th>Delete</th></tr></thead><tbody>${candidates.length?candidates.map(candidateRow).join(""):'<tr><td colspan="9" class="empty">No SDR candidates yet</td></tr>'}</tbody></table></div></div></div>`;document.getElementById("candidateForm").addEventListener("submit",createCandidate)})}
function candidateRow(c){const cls={active:"ok",training:"wait",rejected:"stop",shortlisted:"purple",interviewed:"purple"}[c.stage]||"";const stages=["applied","shortlisted","interviewed","training","active"];return`<tr><td><b>${esc(c.name)}</b><div class="label">${esc(c.phone||"")}</div></td><td>${esc(c.email||"--")}</td><td>${esc(c.country||"--")}</td><td><span class="pill ${cls}">${esc(c.stage||"applied")}</span></td><td>${esc(c.source||"manual")}</td><td>${c.applied_date?ds(c.applied_date):"--"}</td><td><div class="stage-actions">${stages.map(s=>`<button class="btn ${c.stage===s?"btn-gr":""}" onclick="patchCandidate(${c.id},'${s}')">${s}</button>`).join("")}</div></td><td><button class="btn btn-rd mini-btn" onclick="patchCandidate(${c.id},'rejected')">Rejected</button></td><td><button class="btn btn-rd mini-btn" onclick="deleteCandidate(${c.id})">Delete</button></td></tr>`}
function createCandidate(e){e.preventDefault();const p=Object.fromEntries(new FormData(e.currentTarget).entries());req("/sdr-candidates",{method:"POST",body:JSON.stringify(p)}).then(()=>{toast("Candidate added");loadSdrHiring()}).catch(err=>toast(err.message))}
function patchCandidate(id,stage){req("/sdr-candidates/"+id,{method:"PATCH",body:JSON.stringify({stage})}).then(()=>{toast("Candidate moved to "+stage);loadSdrHiring()}).catch(err=>toast(err.message))}
function deleteCandidate(id){if(!confirm("Delete this SDR candidate?"))return;req("/sdr-candidates/"+id,{method:"DELETE"}).then(()=>{toast("Candidate deleted");loadSdrHiring()}).catch(err=>toast(err.message))}
function loadPipeline(){if(activeTab!=="pipeline")return;Promise.all([req("/prospects?status=pending&limit=1"),req("/kpis/dashboard"),req("/clients")]).then(([p,k,c])=>{const clients=c.clients||[];const month=new Date().toISOString().slice(0,7);const newMonth=clients.filter(x=>String(x.started_at||x.start_date||"").slice(0,7)===month).length;const pending=p.total??(p.prospects||[]).length;const dPct=Math.min(100,(k.dials_today||0)/200*100),cPct=Math.min(100,(k.connects_today||0)/60*100),clPct=Math.min(100,clients.length/10*100);document.getElementById("mainContent").innerHTML=`<div class="grid"><div class="panel p12"><h2>Pipeline Funnel</h2><div class="funnel"><div class="funnel-card"><div class="h3">Stage 1</div><div class="big" style="color:var(--cyan)">${pending}</div><h2>LEADS</h2><div class="sub">Pending prospects ready for outreach</div><div class="bar-w" style="margin-top:18px"><i style="width:${Math.min(100,pending/500*100)}%"></i></div></div><div class="funnel-card"><div class="h3">Stage 2</div><div class="big" style="color:var(--green)">${k.dials_today||0}</div><h2>CALLS</h2><div class="sub">${k.connects_today||0} connects / ${k.looms_sent_today||k.talked_interested_today||0} interested / ${k.callback_sets_today||0} callbacks</div><div class="bar-w" style="margin-top:18px"><i class="${dPct>=80?"gr":dPct>=45?"am":"rd"}" style="width:${dPct}%"></i></div><div class="label">Dials target: 200. Connect target: 60 (${cPct.toFixed(0)}%).</div></div><div class="funnel-card"><div class="h3">Stage 3</div><div class="big" style="color:var(--lime)">${clients.length}</div><h2>CLIENTS</h2><div class="sub">${newMonth} new this month</div><div class="bar-w" style="margin-top:18px"><i class="${clPct>=80?"gr":clPct>=45?"am":"rd"}" style="width:${clPct}%"></i></div><div class="label">Client target: 10</div></div></div></div></div>`})}
async function fetchDailySummaryForOverview(){try{const d=await req("/kpis/daily-summary");const el=document.getElementById("dailySumText");if(el&&d.text_block)el.textContent=d.text_block}catch{}}
function toggleQuickLog(){const p=document.getElementById("quickLogPanel");p.classList.toggle("hide");if(!p.classList.contains("hide"))document.getElementById("qlName").focus()}
async function submitQuickLog(e){e.preventDefault();const msg=document.getElementById("qlMsg");const btn=e.currentTarget.querySelector("button");const name=document.getElementById("qlName").value.trim();if(!name){msg.style.color="var(--red)";msg.textContent="Business name required";return}btn.disabled=true;msg.textContent="Logging...";try{const d=await req("/calls/log",{method:"POST",body:JSON.stringify({business_name:name,phone:document.getElementById("qlPhone").value.trim(),disposition:document.getElementById("qlDisp").value,notes:""})});msg.style.color="var(--green)";msg.textContent="Call logged! ID: "+d.id;document.getElementById("qlName").value="";document.getElementById("qlPhone").value="";toast("Quick call logged");loadAll()}catch(err){msg.style.color="var(--red)";msg.textContent=err.message}finally{btn.disabled=false}}
async function exportCalls(){try{const d=await req("/calls/export?date=today");const calls=d.calls||[];if(!calls.length){toast("No calls to export");return}const h=["time","business_name","phone","disposition","duration_seconds","notes","caller_name"];const csv=[h.join(","),...calls.map(c=>h.map(k=>'"'+(c[k]!=null?String(c[k]).replace(/"/g,'""'):"")+'"').join(","))].join("\n");const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="calls_"+new Date().toISOString().slice(0,10)+".csv";a.click();toast("Exported "+calls.length+" calls")}catch(err){toast("Export failed: "+err.message)}}
async function boot(){if(!token){showLogin();return}if(!user){try{user=await req("/auth/me");localStorage.setItem(USR_KEY,JSON.stringify(user))}catch{showLogin("Session expired");return}}showDashboard()}
boot();
</script>
</body>
</html>
